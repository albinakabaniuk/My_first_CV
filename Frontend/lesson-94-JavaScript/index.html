<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Інтерактивна сторінка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .box-style-1 {
            width: 300px;
            height: 300px;
            background-color: gray;
            border-radius: 10px;
            margin: 0 auto;
        }

        .box-style-2 {
            border-radius: 50%;
            background-color: darkblue;
        }
    </style>
</head>
<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="bg-light p-4 rounded shadow text-center" style="width: 400px;">
    <h2 id="title">Заголовок</h2>
    <button class="btn btn-primary mb-3" onclick="changeTitle()">Змінити заголовок</button>

    <!-- ЗАМІСТЬ IMG -->
    <div id="box" class="box-style-1 mb-3"></div>

    <button class="btn btn-secondary mb-3" onclick="toggleBoxStyle()">
        Перемкнути стиль блоку
    </button>

    <p id="description">Це стандартний текст опису.</p>
    <button class="btn btn-success" onclick="updateDescription()">Оновити опис</button>
</div>

<script>
    function changeTitle() {
        const title = document.getElementById("title");
        title.textContent = "Заголовок змінено!";
    }

    function toggleBoxStyle() {
        const box = document.getElementById("box");
        box.classList.toggle("box-style-2");
    }

    function updateDescription() {
        const desc = document.getElementById("description");
        desc.textContent = "Опис було оновлено!";
    }
</script>

</body>
</html>
